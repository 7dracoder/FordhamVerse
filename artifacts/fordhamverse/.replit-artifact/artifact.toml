kind = "web"
previewPath = "/"
title = "FordhamVerse Live"
version = "1.0.0"
id = "artifacts/fordhamverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26055

[services.development]
run = "pnpm --filter @workspace/fordhamverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/fordhamverse", "run", "build" ]
publicDir = "artifacts/fordhamverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26055"
BASE_PATH = "/"
